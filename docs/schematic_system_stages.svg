<rect x="40" y="540" width="1120" height="150" rx="8" fill="#faf7ef" stroke="#d8d2c2" stroke-width="1.5"/>
<text x="56" y="566" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="500" fill="#1a1a1a" text-anchor="start">What flows on the wire (frozen contract)</text>
<text x="56" y="594" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" font-weight="400" fill="#444" text-anchor="start">payload[16] = ver(1) | type(1) | seq(2,LE) | x_mg(4,LE) | y_mg(4,LE) | z_mg(4,LE)</text>
<text x="56" y="620" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="12" font-weight="400" fill="#444" text-anchor="start">frame = 0x7E  stuffed( payload + CRC16-CCITT [big-endian] )  0x7E      (≤ 38 bytes worst case)</text>
<text x="56" y="646" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="400" fill="#444" text-anchor="start">identity is NOT on the wire — the gateway derives node ID from the transport (which connection a frame arrived on)</text>
